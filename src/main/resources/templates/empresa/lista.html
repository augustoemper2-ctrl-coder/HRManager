<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

    <title>Empresas - HRManager</title>

    <link rel="stylesheet"
          th:href="@{/css/bootstrap.min.css}">

</head>

<body class="container mt-4">

<h2>Listado de Empresas</h2>

<a href="/empresa/nuevo"
   class="btn btn-primary mb-3">
    Nueva Empresa
</a>

<table class="table table-bordered table-striped">

    <thead class="table-dark">
    <tr>

        <th>ID</th>
        <th>Nombre</th>
        <th>Razón Social</th>
        <th>NIT</th>
        <th>Dirección</th>
        <th>Teléfono</th>
        <th>Email</th>
        <th>Página Web</th>
        <th>Lema</th>
        <th>Fecha Registro</th>

    </tr>
    </thead>

    <tbody>

    <tr th:each="empresa : ${empresas}">

        <td th:text="${empresa.id}"></td>

        <td th:text="${empresa.nombre}"></td>

        <td th:text="${empresa.razonSocial}"></td>

        <td th:text="${empresa.nit}"></td>

        <td th:text="${empresa.direccion}"></td>

        <td th:text="${empresa.telefono}"></td>

        <td th:text="${empresa.email}"></td>

        <td th:text="${empresa.paginaWeb}"></td>

        <td th:text="${empresa.lema}"></td>

        <td th:text="${empresa.fechaRegistro}"></td>

    </tr>

    </tbody>

</table>

</body>
</html>
