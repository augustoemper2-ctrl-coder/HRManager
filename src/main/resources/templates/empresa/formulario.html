<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Registrar Empresa - HRManager</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f4f6f9;
        }
        .card-form {
            border-radius: 1rem;
            box-shadow: 0 0.5rem 1rem rgba(0,0,0,0.15);
        }
        .btn-primary {
            background-color: #0d6efd;
            border: none;
        }
        .btn-primary:hover {
            background-color: #0b5ed7;
        }
        .form-label {
            font-weight: 600;
        }
        .card-header {
            background-color: #0d6efd;
            color: #fff;
            font-weight: bold;
            border-top-left-radius: 1rem;
            border-top-right-radius: 1rem;
            text-align: center;
        }
    </style>
</head>

<body>

<div class="container mt-5">

    <div class="row justify-content-center">
        <div class="col-lg-7 col-md-8">

            <div class="card card-form">
                <div class="card-header">
                    Registrar Empresa
                </div>
                <div class="card-body p-5">

                    <form th:action="@{/empresa/guardar}" th:object="${empresa}" method="post">

                        <div class="mb-3">
                            <label class="form-label">Nombre de la Empresa</label>
                            <input type="text" th:field="*{nombre}" class="form-control" placeholder="TechNova SAS" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Razón Social</label>
                            <input type="text" th:field="*{razonSocial}" class="form-control" placeholder="TechNova Solutions" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">NIT</label>
                            <input type="text" th:field="*{nit}" class="form-control" placeholder="900123456-7" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Dirección</label>
                            <input type="text" th:field="*{direccion}" class="form-control" placeholder="Calle 123 #45-67, Bogotá">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Teléfono</label>
                            <input type="text" th:field="*{telefono}" class="form-control" placeholder="3101234567">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" th:field="*{email}" class="form-control" placeholder="contacto@technova.com">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Página Web</label>
                            <input type="text" th:field="*{paginaWeb}" class="form-control" placeholder="www.technova.com">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Lema</label>
                            <input type="text" th:field="*{lema}" class="form-control" placeholder="Innovación y Talento">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Logo URL</label>
                            <input type="text" th:field="*{logoUrl}" class="form-control" placeholder="logo.png">
                        </div>

                        <div class="text-center mt-4">
                            <button type="submit" class="btn btn-primary btn-lg w-100">Guardar Empresa</button>
                        </div>

                    </form>

                </div>
            </div>

        </div>
    </div>

</div>

</body>
</html>
