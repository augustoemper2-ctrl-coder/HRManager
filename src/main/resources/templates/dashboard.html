<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Dashboard - HRManager</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">
        <span class="navbar-brand fw-bold">HRManager</span>

        <div class="d-flex">
            <a class="btn btn-outline-light btn-sm me-2" th:href="@{/empleados}">
                Gestión de Empleados
            </a>

            <a class="btn btn-danger btn-sm" th:href="@{/logout}">
                Cerrar Sesión
            </a>
        </div>
    </div>
</nav>

<!-- CONTENIDO -->
<div class="container mt-5">

    <div class="text-center mb-5">
        <h2 class="fw-bold text-primary">Panel de Administración</h2>
        <p class="text-muted">Sistema de Gestión de Recursos Humanos</p>
    </div>

    <div class="row justify-content-center">

        <div class="col-md-4">
            <div class="card shadow border-0 text-center p-4">
                <h5 class="fw-bold">Módulo Empleados</h5>
                <p class="text-muted">Crear, editar y administrar empleados.</p>
                <a th:href="@{/empleados}" class="btn btn-primary">
                    Ir al Módulo
                </a>
            </div>
        </div>

    </div>

</div>

</body>
</html>
