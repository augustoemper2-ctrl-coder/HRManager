<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Formulario Empleado - HRManager</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">
        <span class="navbar-brand fw-bold">HRManager</span>

        <div class="d-flex">
            <a class="btn btn-outline-light btn-sm me-2" th:href="@{/empleados}">
                Gestión de Empleados
            </a>

            <a class="btn btn-danger btn-sm" th:href="@{/logout}">
                Cerrar Sesión
            </a>
        </div>
    </div>
</nav>

<!-- CONTENIDO -->
<div class="container mt-5">

    <div class="card shadow border-0 p-4 col-md-6 mx-auto">

        <h3 class="fw-bold text-primary mb-4 text-center">
            Formulario de Empleado
        </h3>

        <form th:action="@{/empleados/guardar}" th:object="${empleado}" method="post">

            <!-- ID oculto para edición -->
            <input type="hidden" th:field="*{id}" />

            <div class="mb-3">
                <label class="form-label">Nombre</label>
                <input type="text" th:field="*{nombre}" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Documento</label>
                <input type="text" th:field="*{documento}" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Cargo</label>
                <input type="text" th:field="*{cargo}" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Salario</label>
                <input type="number" th:field="*{salario}" class="form-control" required>
            </div>

            <div class="d-flex justify-content-between">

                <a th:href="@{/empleados}" class="btn btn-secondary">
                    Cancelar
                </a>

                <button type="submit" class="btn btn-success">
                    Guardar
                </button>

            </div>

        </form>

    </div>

</div>

</body>
</html>
