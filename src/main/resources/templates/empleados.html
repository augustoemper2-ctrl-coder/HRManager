<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Gestión de Empleados - HRManager</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">
        <span class="navbar-brand fw-bold">HRManager</span>

        <div class="d-flex">
            <a class="btn btn-outline-light btn-sm me-2" th:href="@{/dashboard}">
                Dashboard
            </a>

            <a class="btn btn-danger btn-sm" th:href="@{/logout}">
                Cerrar Sesión
            </a>
        </div>
    </div>
</nav>

<!-- CONTENIDO -->
<div class="container mt-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold text-primary">Gestión de Empleados</h2>

        <a th:href="@{/empleados/nuevo}" class="btn btn-success">
            + Nuevo Empleado
        </a>
    </div>

    <div class="card shadow border-0">
        <div class="card-body">

            <div class="table-responsive">
                <table class="table table-striped table-hover align-middle">

                    <thead class="table-primary">
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Documento</th>
                        <th>Cargo</th>
                        <th>Salario</th>
                        <th class="text-center">Acciones</th>
                    </tr>
                    </thead>

                    <tbody>
                    <tr th:each="empleado : ${empleados}">
                        <td th:text="${empleado.id}"></td>
                        <td th:text="${empleado.nombre}"></td>
                        <td th:text="${empleado.documento}"></td>
                        <td th:text="${empleado.cargo}"></td>
                        <td th:text="${empleado.salario}"></td>

                        <td class="text-center">
                            <a th:href="@{/empleados/editar/{id}(id=${empleado.id})}"
                               class="btn btn-warning btn-sm me-2">
                                Editar
                            </a>

                            <a th:href="@{/empleados/eliminar/{id}(id=${empleado.id})}"
                               class="btn btn-danger btn-sm">
                                Eliminar
                            </a>
                        </td>
                    </tr>
                    </tbody>

                </table>
            </div>

        </div>
    </div>

</div>

</body>
</html>
