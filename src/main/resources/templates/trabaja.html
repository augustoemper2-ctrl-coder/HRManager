<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Trabaja con Nosotros - HRManager</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">

        <span class="navbar-brand fw-bold">HRManager</span>

        <div class="d-flex">

            <a class="btn btn-outline-light btn-sm me-2" th:href="@{/dashboard}">
                Dashboard
            </a>

            <a class="btn btn-danger btn-sm" th:href="@{/logout}">
                Cerrar Sesión
            </a>

        </div>

    </div>
</nav>

<div class="container mt-5 text-center">

    <h2 class="text-primary fw-bold">Trabaja con Nosotros</h2>

    <p class="text-muted">
        Este módulo permitirá que candidatos externos se postulen a vacantes disponibles.
    </p>

    <div class="card shadow p-4 mt-4">
        <h5 class="fw-bold">Próximamente</h5>
        <p>
            Aquí los candidatos podrán enviar su hoja de vida y aplicar a las vacantes publicadas por la empresa.
        </p>

</html>
