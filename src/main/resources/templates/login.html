<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <head>
        <title>Login HRManager</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">

        <!-- Bootstrap CDN -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
</head>
<body class="bg-light">

<div class="container d-flex justify-content-center align-items-center vh-100">

    <div class="card shadow p-4" style="width: 400px; border-radius: 15px;">

        <div class="text-center mb-4">
            <h3 class="fw-bold text-primary">HRManager</h3>
            <p class="text-muted">Iniciar Sesión</p>
        </div>

        <form th:action="@{/login}" method="post">

            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="text" name="username" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" required>
            </div>

            <div class="form-check mb-2">
                <input class="form-check-input" type="checkbox" id="terminos" required>
                <label class="form-check-label" for="terminos">
                    Acepto los
                    <a href="#" onclick="abrirModal('/docs/HRManager_Politica_Tratamiento_Datos_EMPRESARIAL.pdf')">
                        Términos y Condiciones
                    </a>
                </label>
            </div>

            <div class="form-check mb-2">
                <input class="form-check-input" type="checkbox" id="datos" required>
                <label class="form-check-label" for="datos">
                    Autorizo el Tratamiento de Datos Personales
                </label>
            </div>

            <div class="form-check mb-3">
                <input class="form-check-input" type="checkbox" id="robot" required>
                <label class="form-check-label" for="robot">
                    No soy un robot
                </label>
            </div>

            <div class="d-grid">
                <button type="submit" class="btn btn-primary">
                    Entrar
                </button>
            </div>

        </form>

    </div>

</div>

<!-- ================= MODAL LEGAL ================= -->

<div id="modalLegal"
     style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7);">

    <div style="position:absolute; top:5%; left:5%; width:90%; height:90%; background:white; padding:15px; border-radius:8px;">

        <button onclick="cerrarModal()" class="btn btn-danger btn-sm float-end">
            Cerrar
        </button>

        <iframe id="iframeLegal"
                src=""
                width="100%"
                height="90%"
                style="margin-top:10px;">
        </iframe>

    </div>
</div>

<script>
    function abrirModal(ruta) {
        document.getElementById("iframeLegal").src = ruta;
        document.getElementById("modalLegal").style.display = "block";
    }

    function cerrarModal() {
        document.getElementById("modalLegal").style.display = "none";
    }
</script>

</body>
</html>
